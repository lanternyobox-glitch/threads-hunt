<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>尋寶掃碼</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 24px;
      color: #222;
    }
    .wrap {
      max-width: 560px;
      margin: 0 auto;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 24px;
      margin-top: 0;
      margin-bottom: 16px;
    }
    .info {
      margin-bottom: 12px;
      line-height: 1.7;
    }
    .status {
      font-size: 18px;
      font-weight: bold;
      margin: 16px 0;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
    }
    .msg {
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      background: #f2f2f2;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .small {
      color: #666;
      font-size: 14px;
      margin-top: 10px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-top: 8px;
      margin-bottom: 12px;
      font-size: 16px;
    }
    label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>尋寶掃碼</h1>
      <div class="info">QR 編號：<span id="qrId">讀取中...</span></div>
      <div class="info">目前狀態：<span id="qrStatus">等待領取</span></div>

      <label for="threadsId">先輸入你的 Threads 帳號</label>
      <input id="threadsId" type="text" placeholder="例如：lt_letsgo_" />

      <button id="claimBtn">確認掃碼並領取 1 點</button>

      <div id="message" class="msg">系統準備中...</div>
      <div class="small">第一版先用手動輸入 Threads 帳號綁定，之後再升級成正式登入。</div>
    </div>
  </div>

  <script>
    const API_BASE = "https://threads-hunt-api.vercel.app";

    const qrIdEl = document.getElementById("qrId");
    const qrStatusEl = document.getElementById("qrStatus");
    const claimBtn = document.getElementById("claimBtn");
    const messageEl = document.getElementById("message");
    const threadsIdInput = document.getElementById("threadsId");

    const params = new URLSearchParams(window.location.search);
    const qrId = params.get("id");

    function setMessage(text) {
      messageEl.textContent = text;
    }

    function initPage() {
      if (!qrId) {
        qrIdEl.textContent = "未提供";
        qrStatusEl.textContent = "錯誤";
        claimBtn.disabled = true;
        setMessage("網址缺少 QR 編號，請確認連結格式是否正確。");
        return;
      }

      qrIdEl.textContent = qrId;
      qrStatusEl.textContent = "待掃碼";
      setMessage("請輸入 Threads 帳號後領取點數。");
    }

    async function claimPoint() {
      const threadsId = threadsIdInput.value.trim();

      if (!qrId) {
        setMessage("缺少 QR 編號。");
        return;
      }

      if (!threadsId) {
        setMessage("請先輸入你的 Threads 帳號。");
        return;
      }

      claimBtn.disabled = true;
      setMessage("處理中，請稍候...");

      try {
        const res = await fetch(`${API_BASE}/api/claim`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            qr_id: qrId,
            threads_id: threadsId
          })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "處理失敗");
        }

        qrStatusEl.textContent = "已被使用";
        setMessage(data.message || `成功，已幫 @${threadsId} 增加 1 點。`);
      } catch (err) {
        setMessage("處理失敗：" + err.message);
        claimBtn.disabled = false;
      }
    }

    claimBtn.addEventListener("click", claimPoint);
    initPage();
  </script>
</body>
</html>
