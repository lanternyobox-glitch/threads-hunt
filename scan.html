<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>尋寶掃碼</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 24px;
      color: #222;
    }
    .wrap {
      max-width: 560px;
      margin: 0 auto;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 24px;
      margin-top: 0;
      margin-bottom: 16px;
    }
    .info {
      margin-bottom: 12px;
      line-height: 1.7;
    }
    .status {
      font-size: 18px;
      font-weight: bold;
      margin: 16px 0;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 16px;
      cursor: pointer;
    }
    .btn-main {
      width: 100%;
    }
    .msg {
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      background: #f2f2f2;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .small {
      color: #666;
      font-size: 14px;
      margin-top: 10px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-top: 8px;
      margin-bottom: 12px;
      font-size: 16px;
    }
    label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>尋寶掃碼</h1>
      <div class="info">QR 編號：<span id="qrId">讀取中...</span></div>
      <div class="info">目前狀態：<span id="qrStatus">讀取中...</span></div>

      <label for="threadsId">先輸入你的 Threads 帳號</label>
      <input id="threadsId" type="text" placeholder="例如：lt_letsgo_" />

      <button id="claimBtn" class="btn-main">確認掃碼並領取 1 點</button>

      <div id="message" class="msg">系統準備中...</div>
      <div class="small">第一版先用手動輸入 Threads 帳號綁定，之後再升級成正式登入。</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "請換成你的 Project URL";
    const SUPABASE_ANON_KEY = "請換成你的 anon public key";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const qrIdEl = document.getElementById("qrId");
    const qrStatusEl = document.getElementById("qrStatus");
    const claimBtn = document.getElementById("claimBtn");
    const messageEl = document.getElementById("message");
    const threadsIdInput = document.getElementById("threadsId");

    const params = new URLSearchParams(window.location.search);
    const qrId = params.get("id");

    let currentQr = null;

    function setMessage(text) {
      messageEl.textContent = text;
    }

    async function loadQrStatus() {
      if (!qrId) {
        qrIdEl.textContent = "未提供";
        qrStatusEl.textContent = "錯誤";
        claimBtn.disabled = true;
        setMessage("網址缺少 QR 編號，請確認連結格式是否正確。");
        return;
      }

      qrIdEl.textContent = qrId;

      const { data, error } = await supabaseClient
        .from("qr_codes")
        .select("*")
        .eq("id", qrId)
        .maybeSingle();

      if (error) {
        qrStatusEl.textContent = "讀取失敗";
        claimBtn.disabled = true;
        setMessage("讀取 QR 狀態失敗：" + error.message);
        return;
      }

      if (!data) {
        qrStatusEl.textContent = "不存在";
        claimBtn.disabled = true;
        setMessage("查無此 QR 編號，請確認這個碼是否已正確建立。");
        return;
      }

      currentQr = data;

      if (data.is_used) {
        qrStatusEl.textContent = "已被使用";
        claimBtn.disabled = true;
        setMessage("這個 QR Code 已經被使用過了。");
      } else {
        qrStatusEl.textContent = "尚未使用";
        claimBtn.disabled = false;
        setMessage("這個 QR Code 尚未使用，可以進行領取。");
      }
    }

    async function claimPoint() {
      const threadsId = threadsIdInput.value.trim();

      if (!qrId || !currentQr) {
        setMessage("QR 狀態尚未載入完成。");
        return;
      }

      if (!threadsId) {
        setMessage("請先輸入你的 Threads 帳號。");
        return;
      }

      claimBtn.disabled = true;
      setMessage("處理中，請稍候...");

      try {
        const { data: existingUser, error: findUserError } = await supabaseClient
          .from("users")
          .select("*")
          .eq("threads_id", threadsId)
          .maybeSingle();

        if (findUserError) {
          throw findUserError;
        }

        let userId = null;
        let currentPoints = 0;

        if (existingUser) {
          userId = existingUser.id;
          currentPoints = existingUser.points || 0;
        } else {
          const { data: newUser, error: insertUserError } = await supabaseClient
            .from("users")
            .insert([{ threads_id: threadsId, points: 0 }])
            .select()
            .single();

          if (insertUserError) {
            throw insertUserError;
          }

          userId = newUser.id;
          currentPoints = 0;
        }

        const { error: updateQrError } = await supabaseClient
          .from("qr_codes")
          .update({ is_used: true })
          .eq("id", qrId)
          .eq("is_used", false);

        if (updateQrError) {
          throw updateQrError;
        }

        const { error: updateUserError } = await supabaseClient
          .from("users")
          .update({ points: currentPoints + 1 })
          .eq("id", userId);

        if (updateUserError) {
          throw updateUserError;
        }

        const { error: logError } = await supabaseClient
          .from("scan_logs")
          .insert([{ qr_id: qrId, user_id: userId }]);

        if (logError) {
          throw logError;
        }

        qrStatusEl.textContent = "已被使用";
        setMessage("成功，已幫 @" + threadsId + " 增加 1 點。");
      } catch (err) {
        setMessage("處理失敗：" + err.message);
        claimBtn.disabled = false;
      }
    }

    claimBtn.addEventListener("click", claimPoint);
    loadQrStatus();
  </script>
</body>
</html>
